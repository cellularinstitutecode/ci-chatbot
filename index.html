<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cellular Institute AI Coordinator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ci-navy: #6B3A1F;
  --ci-teal: #8A4A26;
  --ci-gold: #C9A84C;
  --ci-light: #F7F2EA;
  --ci-white: #FFFFFF;
  --ci-gray: #6B7280;
  --ci-border: #E5E7EB;
  --ci-success: #10B981;
  --ci-error: #EF4444;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(10,25,49,0.10);
}
html, body { height: 100%; font-family: 'Inter', sans-serif; background: transparent; }
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
#chat-widget {
  width: 420px; max-width: 100vw;
  background: var(--ci-white);
  border-radius: 20px;
  box-shadow: var(--shadow);
  display: flex; flex-direction: column;
  overflow: hidden;
  max-height: 92vh;
}
.cw-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 18px;
  background: linear-gradient(135deg, var(--ci-navy) 0%, var(--ci-teal) 100%);
  color: var(--ci-white);
}
.cw-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--ci-white);
  overflow: hidden; flex-shrink: 0;
}
.cw-header-text h2 { font-size: 16px; font-weight: 600; line-height: 1.2; }
.cw-header-text p { font-size: 12px; opacity: 0.85; }
.cw-status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; }
.cw-status-dot { width: 8px; height: 8px; background: var(--ci-success); border-radius: 50%; }
.cw-progress { padding: 0 18px; background: var(--ci-light); }
.progress-bar { height: 4px; background: var(--ci-border); border-radius: 2px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--ci-gold), var(--ci-teal)); transition: width 0.4s ease; }
.cw-messages {
  flex: 1; overflow-y: auto;
  padding: 18px;
  background: var(--ci-light);
  display: flex; flex-direction: column; gap: 10px;
  min-height: 320px;
}
.msg { display: flex; gap: 8px; max-width: 90%; animation: fadeIn 0.3s ease; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--ci-white); }
.msg-bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px; line-height: 1.45;
  word-wrap: break-word;
}
.msg.bot .msg-bubble { background: var(--ci-white); color: #1F2937; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.msg.user .msg-bubble { background: var(--ci-teal); color: var(--ci-white); border-bottom-right-radius: 4px; }
.msg-bubble strong { color: var(--ci-navy); }
.msg.user .msg-bubble strong { color: var(--ci-white); }
.section-divider { font-size: 11px; color: var(--ci-gray); text-align: center; padding: 4px 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.typing { display: flex; gap: 4px; padding: 12px 14px; background: var(--ci-white); border-radius: 14px; border-bottom-left-radius: 4px; align-self: flex-start; width: fit-content; }
.typing span { width: 6px; height: 6px; background: var(--ci-gray); border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.cw-input-area { padding: 12px 14px; background: var(--ci-white); border-top: 1px solid var(--ci-border); }
.quick-replies { display: flex; flex-wrap: wrap; gap: 8px; }
.qr-btn {
  padding: 9px 14px;
  background: var(--ci-white);
  border: 1.5px solid var(--ci-teal);
  color: var(--ci-teal);
  border-radius: 999px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.qr-btn:hover { background: var(--ci-teal); color: var(--ci-white); }
.text-input-wrap { display: flex; gap: 8px; }
.text-input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--ci-border);
  border-radius: 24px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
}
.text-input:focus { border-color: var(--ci-teal); }
.send-btn {
  width: 40px; height: 40px;
  background: var(--ci-teal);
  color: var(--ci-white);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
}
.send-btn:hover { background: var(--ci-navy); }
.cw-footer { padding: 8px; text-align: center; font-size: 11px; color: var(--ci-gray); background: var(--ci-white); border-top: 1px solid var(--ci-border); }
.cw-footer a { color: var(--ci-teal); text-decoration: none; font-weight: 500; }
.summary-card { background: var(--ci-light); border: 1px solid var(--ci-border); border-radius: 12px; padding: 12px 14px; margin-top: 4px; font-size: 13px; line-height: 1.6; }
.summary-card .row { display: flex; gap: 6px; padding: 3px 0; border-bottom: 1px dashed var(--ci-border); }
.summary-card .row:last-child { border-bottom: none; }
.summary-card .lbl { font-weight: 600; color: var(--ci-navy); min-width: 120px; }
.summary-card .val { color: #1F2937; flex: 1; }
</style>
</head>
<body>
<div id="chat-widget">
  <div class="cw-header">
    <div class="cw-avatar"><img src="https://www.cellularhopeinstitute.com/wp-content/uploads/2026/05/ci-logo.jpg" alt="Cellular Institute" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;"></div>
    <div class="cw-header-text">
      <h2>Cellular Institute AI</h2>
      <p>Regenerative Medicine Coordinator</p>
    </div>
    <div class="cw-status">
      <div class="cw-status-dot"></div>
      Online
    </div>
  </div>
  <div class="cw-progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="cw-messages" id="chatMessages"></div>
  <div class="cw-input-area" id="inputArea"></div>
  <div class="cw-footer">Powered by <a href="https://cellularinstitute.com" target="_blank">Cellular Institute</a></div>
</div>
<script>
(function() {
  // HubSpot calls go through Vercel proxy — token never exposed in frontend code
  var PROXY_URL = 'https://ci-hubspot-proxy.vercel.app/api/hubspot';
  var hsContactId = null;
  var hsQueue = Promise.resolve();
  function hsSave(props) {
    if (!props || Object.keys(props).length === 0) return hsQueue;
    hsQueue = hsQueue.then(function() {
      if (!hsContactId) {
        return fetch(PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'create', properties: props })
        }).then(function(r) { return r.json(); }).then(function(d) {
          if (d && d.id) { hsContactId = d.id; }
          else if (d && d.existingId) { hsContactId = d.existingId; return hsPatchNow(props); }
        }).catch(function(e) { console.warn('[CI] hsSave error', e); });
      } else {
        return hsPatchNow(props);
      }
    });
    return hsQueue;
  }
  function hsPatchNow(props) {
    return fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', contactId: hsContactId, properties: props })
    }).then(function(r) { return r.json(); }).catch(function(e) { console.warn('[CI] hsPatch error', e); });
  }

  // ===== State =====
  var lead = {
    firstName: '', lastName: '', email: '', phone: '', country: '',
    conditionCategory: '', conditionDetail: '',
    preferredContact: '', bestTime: '',
    canTravel: '', oopOk: '',
    timeline: '', readiness: '',
    prevTreatment: '', prevLocation: '', prevWhen: '',
    medicalRecords: '',
    sourcePage: location.href,
    utm: (function() {
      var p = new URLSearchParams(location.search);
      return {
        utm_source: p.get('utm_source') || '',
        utm_medium: p.get('utm_medium') || '',
        utm_campaign: p.get('utm_campaign') || ''
      };
    })()
  };

  // Total steps for progress bar
  var TOTAL_STEPS = 18;
  var currentStepNum = 0;

  var msgsEl = document.getElementById('chatMessages');
  var inputEl = document.getElementById('inputArea');
  var progressEl = document.getElementById('progressFill');

  function setProgress() {
    currentStepNum++;
    var pct = Math.min(100, Math.round((currentStepNum / TOTAL_STEPS) * 100));
    progressEl.style.width = pct + '%';
  }
  function scrollBottom() { msgsEl.scrollTop = msgsEl.scrollHeight; }
  function addMsg(text, who) {
    var d = document.createElement('div');
    d.className = 'msg ' + who;
    var av = '';
    if (who === 'bot') {
      av = '<div class="msg-avatar"><img src="https://www.cellularhopeinstitute.com/wp-content/uploads/2026/05/ci-logo.jpg" style="width:100%;height:100%;object-fit:cover;display:block;"></div>';
    }
    d.innerHTML = av + '<div class="msg-bubble">' + text + '</div>';
    msgsEl.appendChild(d);
    scrollBottom();
  }
  function addSectionDivider(text) {
    var d = document.createElement('div');
    d.className = 'section-divider';
    d.textContent = text;
    msgsEl.appendChild(d);
    scrollBottom();
  }
  function showTyping() {
    var t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typingIndicator';
    t.innerHTML = '<span></span><span></span><span></span>';
    msgsEl.appendChild(t);
    scrollBottom();
  }
  function hideTyping() {
    var t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }
  function botSay(text, delay) {
    delay = delay || 700;
    return new Promise(function(resolve) {
      showTyping();
      setTimeout(function() {
        hideTyping();
        addMsg(text, 'bot');
        resolve();
      }, delay);
    });
  }
  function clearInput() { inputEl.innerHTML = ''; }
  function renderQuickReplies(opts, onSelect) {
    clearInput();
    var wrap = document.createElement('div');
    wrap.className = 'quick-replies';
    opts.forEach(function(opt) {
      var b = document.createElement('button');
      b.className = 'qr-btn';
      b.type = 'button';
      b.textContent = opt;
      b.onclick = function() {
        addMsg(opt, 'user');
        clearInput();
        onSelect(opt);
      };
      wrap.appendChild(b);
    });
    inputEl.appendChild(wrap);
  }
  function renderTextInput(placeholder, onSubmit, type) {
    clearInput();
    var wrap = document.createElement('div');
    wrap.className = 'text-input-wrap';
    var inp = document.createElement('input');
    inp.className = 'text-input';
    inp.type = type || 'text';
    inp.placeholder = placeholder;
    var btn = document.createElement('button');
    btn.className = 'send-btn';
    btn.type = 'button';
    btn.innerHTML = '&#10148;';
    function submit() {
      var v = inp.value.trim();
      if (!v) return;
      addMsg(v, 'user');
      clearInput();
      onSubmit(v);
    }
    btn.onclick = submit;
    inp.onkeydown = function(e) { if (e.key === 'Enter') submit(); };
    wrap.appendChild(inp);
    wrap.appendChild(btn);
    inputEl.appendChild(wrap);
    inp.focus();
  }

  // ===== Flow =====
  function start() {
    addSectionDivider('Section 1 \u00B7 Welcome');
    setProgress();
    botSay("Welcome to <strong>Cellular Institute</strong>. I'll ask a few quick questions so our patient coordination team can understand your condition, your goals, and guide you toward the right next step. This chat does not provide a diagnosis. It helps us collect the basic information needed before a coordinator contacts you.", 1100)
      .then(function() {
        renderQuickReplies(['Yes, go ahead'], function() { askCondition(); });
      });
  }

  function askCondition() {
    addSectionDivider('Section 2 \u00B7 Your Condition or Goal');
    setProgress();
    botSay('What best describes what you are looking for?', 700).then(function() {
      renderQuickReplies([
        'Orthopedics / Joint Pain',
        'Sports Injuries / Pain Management',
        'Autoimmune / Inflammatory Conditions',
        'Neurological Conditions',
        'Longevity / Anti-Aging',
        'Other Condition'
      ], function(val) {
        lead.conditionCategory = val;
        askConditionDetail();
      });
    });
  }

  function askConditionDetail() {
    setProgress();
    botSay('Please briefly describe the specific condition, injury, or goal you are looking to address.', 700).then(function() {
      renderTextInput("Example: knee pain, shoulder injury, arthritis, Parkinson's, autoimmune condition, longevity program, etc.", function(val) {
        lead.conditionDetail = val;
        askFirstName();
      });
    });
  }

  function askFirstName() {
    addSectionDivider('Section 3 \u00B7 Contact Information');
    setProgress();
    botSay("Great. Let's collect your contact information so our team can follow up.", 700).then(function() {
      return botSay('What is your <strong>first name</strong>?', 500);
    }).then(function() {
      renderTextInput('First name', function(val) {
        lead.firstName = val;
        askLastName();
      });
    });
  }
  function askLastName() {
    botSay('And your <strong>last name</strong>?', 500).then(function() {
      renderTextInput('Last name', function(val) {
        lead.lastName = val;
        askEmail();
      });
    });
  }
  function askEmail() {
    botSay('What is your <strong>email address</strong>?', 500).then(function() {
      renderTextInput('you@email.com', function(val) {
        lead.email = val;
        askPhone();
      }, 'email');
    });
  }
  function askPhone() {
    botSay('Your <strong>phone or WhatsApp</strong> number?', 500).then(function() {
      renderTextInput('+1 555 555 5555', function(val) {
        lead.phone = val;
        askCountry();
      }, 'tel');
    });
  }
  function askCountry() {
    botSay('What <strong>country</strong> are you located in?', 500).then(function() {
      renderTextInput('Country', function(val) {
        lead.country = val;
        // CAPTURE LEAD HERE — after Section 3
        hsSave({
          firstname: lead.firstName,
          lastname: lead.lastName,
          email: lead.email,
          phone: lead.phone,
          country: lead.country,
          condition_category: lead.conditionCategory,
          condition_detail: lead.conditionDetail,
          source_page: lead.sourcePage,
          utm_source: lead.utm.utm_source,
          utm_medium: lead.utm.utm_medium,
          utm_campaign: lead.utm.utm_campaign
        });
        askPreferredContact();
      });
    });
  }
  function askPreferredContact() {
    setProgress();
    botSay('How would you prefer we contact you?', 600).then(function() {
      renderQuickReplies(['WhatsApp', 'Phone call', 'Email', 'Text message'], function(val) {
        lead.preferredContact = val;
        askBestTime();
      });
    });
  }
  function askBestTime() {
    botSay('What is the best time to contact you?', 500).then(function() {
      renderQuickReplies(['Morning', 'Afternoon', 'Evening', 'Anytime'], function(val) {
        lead.bestTime = val;
        hsSave({ preferred_contact: lead.preferredContact, best_time: lead.bestTime });
        askLocation();
      });
    });
  }

  function askLocation() {
    addSectionDivider('Section 4 \u00B7 Location');
    setProgress();
    botSay('Our clinic is located in <strong>Cancun, Mexico</strong>, and most programs require traveling here for treatment. Would you be able to travel to Cancun if our team determines you may be a good candidate?', 900).then(function() {
      renderQuickReplies([
        'Yes, I can travel',
        'I may be able to travel',
        'I need more information first',
        'No, I cannot travel'
      ], function(val) {
        lead.canTravel = val;
        hsSave({ can_travel: val });
        askOOP();
      });
    });
  }

  function askOOP() {
    addSectionDivider('Section 5 \u00B7 Out-of-Pocket Programs');
    setProgress();
    botSay('Cellular Institute provides personalized regenerative medicine programs that are generally <strong>paid out of pocket</strong> and are not covered by insurance. The exact recommendation depends on your condition, goals, medical records, diagnostics, and the treatment plan designed by the team.', 1100).then(function() {
      return botSay('Is this something you are comfortable considering?', 600);
    }).then(function() {
      renderQuickReplies([
        'Yes, I understand',
        'I need more information',
        'Not ready at this time'
      ], function(val) {
        lead.oopOk = val;
        hsSave({ oop_ack: val });
        askTimeline();
      });
    });
  }

  function askTimeline() {
    addSectionDivider('Section 6 \u00B7 Timeline / Readiness');
    setProgress();
    botSay('When are you hoping to begin your treatment or consultation process?', 700).then(function() {
      renderQuickReplies([
        'As soon as possible',
        'Within 1 month',
        '1 to 3 months',
        '3 to 6 months',
        '6+ months',
        'Just researching'
      ], function(val) {
        lead.timeline = val;
        askReadiness();
      });
    });
  }
  function askReadiness() {
    setProgress();
    botSay('How ready are you to speak with a patient coordinator?', 600).then(function() {
      renderQuickReplies([
        'Very ready',
        'I have questions first',
        "I'm still researching",
        "I'm helping someone else"
      ], function(val) {
        lead.readiness = val;
        hsSave({ timeline: lead.timeline, readiness: lead.readiness });
        askPrevTreatment();
      });
    });
  }

  function askPrevTreatment() {
    addSectionDivider('Section 7 \u00B7 Previous Regenerative Treatments');
    setProgress();
    botSay('Have you received any regenerative medicine treatments before?', 700).then(function() {
      renderQuickReplies([
        'Yes, stem cell therapy',
        'Yes, exosome therapy',
        'Yes, PRP or orthobiologics',
        'Yes, other regenerative treatments',
        'No, this would be my first time',
        'Not sure'
      ], function(val) {
        lead.prevTreatment = val;
        if (val.indexOf('Yes') === 0) {
          askPrevLocation();
        } else {
          hsSave({ prev_treatment: val });
          askMedicalRecords();
        }
      });
    });
  }
  function askPrevLocation() {
    botSay('Where did you receive the treatment?', 500).then(function() {
      renderTextInput('Clinic, city, or country', function(val) {
        lead.prevLocation = val;
        askPrevWhen();
      });
    });
  }
  function askPrevWhen() {
    botSay('When was your most recent treatment?', 500).then(function() {
      renderQuickReplies([
        'Less than 3 months ago',
        '3 to 6 months ago',
        '6 to 12 months ago',
        'More than 1 year ago'
      ], function(val) {
        lead.prevWhen = val;
        hsSave({
          prev_treatment: lead.prevTreatment,
          prev_location: lead.prevLocation,
          prev_when: lead.prevWhen
        });
        askMedicalRecords();
      });
    });
  }

  function askMedicalRecords() {
    addSectionDivider('Section 8 \u00B7 Medical Records');
    setProgress();
    botSay('Do you have any medical records, labs, imaging, or reports related to your condition?', 800).then(function() {
      renderQuickReplies([
        'Yes, I can share them',
        'Yes, but later',
        'No, not yet',
        'Not sure'
      ], function(val) {
        lead.medicalRecords = val;
        hsSave({ medical_records: val });
        if (val.indexOf('Yes') === 0) {
          botSay('Great. Our team may ask you to share relevant records before your consultation so the medical team can better understand your case.', 800).then(showSummary);
        } else {
          showSummary();
        }
      });
    });
  }

  function buildSummaryHTML() {
    var rows = [
      ['Name', (lead.firstName + ' ' + lead.lastName).trim()],
      ['Condition / Goal', lead.conditionCategory],
      ['Specific Area', lead.conditionDetail],
      ['Previous Regenerative Treatment', lead.prevTreatment + (lead.prevLocation ? ' (' + lead.prevLocation + ', ' + lead.prevWhen + ')' : '')],
      ['Can Travel to Cancun', lead.canTravel],
      ['Out-of-pocket Understanding', lead.oopOk],
      ['Timeline', lead.timeline],
      ['Medical Records', lead.medicalRecords],
      ['Preferred Contact', lead.preferredContact + (lead.bestTime ? ' (' + lead.bestTime + ')' : '')]
    ];
    var html = '<div class="summary-card">';
    rows.forEach(function(r) {
      html += '<div class="row"><div class="lbl">' + r[0] + '</div><div class="val">' + (r[1] || '\u2014') + '</div></div>';
    });
    html += '</div>';
    return html;
  }

  function showSummary() {
    addSectionDivider('Section 9 \u00B7 Summary & Next Step');
    setProgress();
    botSay('Thank you. Here is a quick summary of the information you shared:', 800).then(function() {
      addMsg(buildSummaryHTML(), 'bot');
      return botSay('Our patient coordination team will review your information and contact you to better understand your case, answer your questions, and guide you toward the next step.', 900);
    }).then(function() {
      return botSay('Please remember: this chat does not provide a diagnosis or medical recommendation. A personalized plan can only be discussed after reviewing your information and speaking with our team.', 1000);
    }).then(function() {
      renderQuickReplies(['Schedule a call', 'Send my information', 'Start over'], function(val) {
        if (val === 'Start over') {
          location.reload();
        } else {
          hsSave({ final_choice: val });
          botSay('Thank you! Your information has been sent to our patient coordination team. We will reach out shortly.', 800).then(function() {
            clearInput();
          });
        }
      });
    });
  }

  // Boot
  start();
})();
</script>
</body>
</html>
